name: Hourly VPS Trigger (No Code Updates)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Scripts and Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DISCORD_WEBHOOK
          script: |
            export DISCORD_WEBHOOK="${{ secrets.DISCORD_WEBHOOK }}"
            cd ~/dealnews1
            
            # 1. Ensure containers are up (uses current local images only)
            cd laradock
            docker compose up -d mysql dealnews-scraper
            
            # 2. Run your local scripts
            cd ..
            bash hourly.sh
            
            # 3. Run monitor
            source venv/bin/activate
            python3 monitor.py            python3 monitor.py
