name: Hourly VPS Trigger

# VPS now handles its own credentials via the .env file, 
# No need to pass the secret through the GitHub Action YAML.

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Scripts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/dealnews1
            
            # Ensure containers are up
            cd laradock
            docker compose up -d mysql dealnews-scraper
            
            # Run tasks (they will find the .env themselves)
            cd ..
            bash hourly.sh
            source venv/bin/activate
            python3 monitor.pyhon3 monitor.py            python3 monitor.py
